<p-dialog
  [visible]="isOpen()"
  (visibleChange)="handleClose()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [styleClass]="'w-full sm:w-[900px] max-w-[95vw]'"
  header="Configurar imágenes del producto"
>
  <div class="p-6 overflow-y-auto max-h-[85vh] space-y-4">
    @if (modalError()) {
    <div
      class="bg-red-50 dark:bg-red-950/15 border border-red-200 dark:border-red-900/50 rounded-xl p-3 text-red-650 dark:text-red-400 text-xs flex items-center gap-2"
    >
      <i class="pi pi-exclamation-circle text-sm shrink-0"></i>
      <span>{{ modalError() }}</span>
    </div>
    } @if (loadingImages()) {
    <div
      class="flex flex-col items-center justify-center py-10 bg-slate-50 dark:bg-slate-800/10 border border-slate-200 dark:border-slate-800 rounded-xl"
    >
      <p-progressspinner
        class="w-8 h-8"
        strokeWidth="4"
        fill="var(--surface-ground)"
      ></p-progressspinner>
      <p class="text-slate-550 dark:text-slate-400 text-xs mt-2">Cargando fotos del servidor...</p>
    </div>
    } @else {
    <app-image-manager
      [initialImages]="mappedImages()"
      [saving]="saving()"
      (uploadNewImages)="handleUploadNewImages($event)"
      (saveReorderedImages)="handleSaveReorderedImages($event)"
      (deleteImage)="handleDeleteImage($event)"
    />
    }
  </div>
</p-dialog>
