<header
  class="h-14 bg-card text-primary border-b border-default flex items-center justify-between px-3 sm:px-4 z-40 sticky top-0"
>
  <!-- Left: toggle + logo + search -->
  <div class="flex items-center gap-5 ">
    <!-- Toggle sidebar button -->
    <button
      (click)="toggleSidebar()"
      class="p-1.5 text-muted hover:text-primary hover:bg-border-soft rounded-lg transition-colors flex items-center justify-center cursor-pointer"
    >
      @if (isSidebarCollapsed()) {
      <i class="pi pi-bars text-sm"></i>
      } @else {
      <i class="pi pi-times text-sm"></i>
      }
    </button>

    <!-- Logo -->
    <a routerLink="/dashboard">
      <app-logo-primary />
    </a>

    <!-- Global Search (hidden on mobile) -->
    <div class="hidden md:block min-w-sm">
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input type="text" pInputText placeholder="Search" pSize="small" fluid />
      </p-iconfield>
    </div>
  </div>

  <!-- Right: notifications, user -->
  <div class="flex items-center gap-5">
    <!-- Notifications -->
    <button
      class="relative p-1.5 text-muted hover:text-primary transition-colors flex items-center justify-center"
      type="button"
    >
      <i class="pi pi-bell text-sm"></i>
      <span
        class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-card"
      ></span>
    </button>

    <!-- User profile -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:block text-right">
        <p class="text-xs font-semibold text-primary leading-none">
          {{ authService.user()?.fullName || 'Vendedor' }}
        </p>
        <p class="text-[9px] text-muted mt-0.5 leading-none">
          {{ authService.user()?.role }}
        </p>
      </div>
      <button
        class="w-8 h-8 rounded-full bg-app flex items-center justify-center text-primary border border-default hover:ring-2 hover:ring-sky-500 transition-all"
        type="button"
      >
        <i class="pi pi-user text-xs"></i>
      </button>
    </div>
  </div>
</header>
