<header
  class="h-14 bg-slate-900 text-white border-b border-slate-800 flex items-center justify-between px-3 sm:px-4 z-40 sticky top-0"
>
  <!-- Left: toggle + logo + search -->
  <div class="flex items-center gap-3 flex-1">
    <!-- Toggle sidebar button -->
    <button
      (click)="toggleSidebar()"
      class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors flex items-center justify-center cursor-pointer"
    >
      @if (isSidebarCollapsed()) {
      <i class="pi pi-bars text-sm"></i>
      } @else {
      <i class="pi pi-times text-sm"></i>
      }
    </button>

    <!-- Logo -->
    <a
      routerLink="/dashboard"
      class="flex items-center gap-2 mr-4 hover:opacity-90 transition-opacity"
    >
      <div
        class="w-7 h-7 bg-sky-600 rounded-lg flex items-center justify-center text-white font-bold text-base"
      >
        C
      </div>
      <span class="text-base font-bold tracking-tight text-white hidden sm:inline">
        Chiconcuac<span class="text-sky-500">Market</span>
      </span>
    </a>

    <!-- Global Search (hidden on mobile) -->
    <div class="hidden md:block max-w-xs w-full relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none z-10">
        <i class="pi pi-search text-slate-400 text-xs"></i>
      </div>
      <input
        type="text"
        placeholder="Buscar..."
        class="w-full pl-9 pr-4 h-8 bg-slate-800/40 text-slate-200 text-xs border border-transparent rounded-lg placeholder-slate-500 focus:outline-none focus:bg-slate-800 focus:border-slate-700 transition-all"
      />
    </div>
  </div>

  <!-- Right: notifications, user -->
  <div class="flex items-center gap-3">
    <!-- Notifications -->
    <button
      class="relative p-1.5 text-slate-400 hover:text-white transition-colors flex items-center justify-center"
      type="button"
    >
      <i class="pi pi-bell text-sm"></i>
      <span
        class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-slate-900"
      ></span>
    </button>

    <!-- Divider -->
    <div class="h-5 w-px bg-slate-800"></div>

    <!-- User profile -->
    <div class="flex items-center gap-2">
      <div class="hidden sm:block text-right">
        <p class="text-xs font-semibold text-slate-200 leading-none">
          {{ authService.user()?.fullName || 'Vendedor' }}
        </p>
        <p class="text-[9px] text-slate-400 mt-0.5 leading-none">
          {{ authService.user()?.role }}
        </p>
      </div>
      <button
        class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-300 border border-slate-700 hover:ring-2 hover:ring-sky-500 transition-all"
        type="button"
      >
        <i class="pi pi-user text-xs"></i>
      </button>
    </div>
  </div>
</header>
